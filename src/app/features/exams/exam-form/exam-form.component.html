<div class="form-page">
  <div class="page-header">
    <div class="header-left">
      <p-button icon="pi pi-arrow-left" severity="secondary" [rounded]="true" [text]="true" (click)="goBack()"></p-button>
      <nav class="breadcrumb">
        <span class="breadcrumb-link" (click)="goBack()">{{ 'EXAMS.TITLE' | translate }}</span>
        <span class="breadcrumb-sep"> &gt; </span>
        <span>{{ pageTitle }}</span>
      </nav>
    </div>
  </div>

  <p-card [header]="pageTitle">
    <app-dynamic-form
      [config]="formConfig"
      [initialValues]="initialValues"
      (formSubmit)="onSubmit($event)"
      (formChange)="onFormChange($event)"
      (formCancel)="onCancel()">
    </app-dynamic-form>
  </p-card>

  <p-toast></p-toast>
</div>
