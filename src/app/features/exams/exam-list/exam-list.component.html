<div class="page-container">
  <div class="page-header">
    <h1>{{ 'EXAMS.TITLE' | translate }}</h1>
    <div class="header-actions">
      <p-button
        icon="pi pi-id-card"
        [label]="'EXAMS.REPORT_CARDS' | translate"
        severity="secondary"
        (click)="goToReportCards()">
      </p-button>
    </div>
  </div>

  <app-data-table
    [config]="tableConfig"
    [data]="data"
    [loading]="loading"
    (add)="onAdd()"
    (edit)="onEdit($event)"
    (view)="onView($event)"
    (delete)="onDelete($event)"
    (filterChange)="onFilter($event)">
  </app-data-table>

  <p-confirmDialog></p-confirmDialog>
  <p-toast></p-toast>
</div>
