<p-toast />
<p-confirmDialog />

<div class="parent-list-page">
  <!-- Header -->
  <div class="page-header">
    <div class="page-header-left">
      <h2>{{ 'PARENTS.TITLE' | translate }}</h2>
    </div>
    <div class="page-header-actions">
      <p-button
        icon="pi pi-users"
        [label]="'PARENTS.BULK_CREATE' | translate"
        severity="secondary"
        (onClick)="onBulkCreate()"
        class="mr-2"
      />
      <p-button
        icon="pi pi-download"
        [label]="'PARENTS.DOWNLOAD_CSV' | translate"
        severity="secondary"
        (onClick)="downloadCsv()"
        class="mr-2"
      />
      <p-button
        icon="pi pi-plus"
        [label]="'PARENTS.ADD' | translate"
        (onClick)="onAdd()"
      />
    </div>
  </div>

  <!-- Data Table -->
  <app-data-table
    [config]="tableConfig"
    [data]="data"
    [loading]="loading"
    (addClick)="onAdd()"
    (viewClick)="onView($event)"
    (editClick)="onEdit($event)"
    (deleteClick)="onDelete($event)"
    (resetPasswordClick)="onResetPassword($event)"
    (toggleActiveClick)="onToggleActive($event)"
    (filterChange)="onFilter($event)"
  />
</div>

<!-- Reset Password Dialog -->
<p-dialog
  [(visible)]="showPasswordDialog"
  [header]="'PARENTS.RESET_PASSWORD_SUCCESS' | translate"
  [modal]="true"
  [closable]="true"
  [style]="{ width: '420px' }"
>
  <div class="credentials-dialog">
    <p class="credentials-note">{{ 'PARENTS.CREDENTIALS_NOTE' | translate }}</p>
    <div class="credential-row">
      <label>{{ 'PARENTS.NAME' | translate }}:</label>
      <span>{{ resetParentName }}</span>
    </div>
    <div class="credential-row">
      <label>{{ 'PARENTS.NEW_PASSWORD' | translate }}:</label>
      <strong>{{ newPassword }}</strong>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button
      icon="pi pi-copy"
      [label]="'PARENTS.COPY_CREDENTIALS' | translate"
      severity="secondary"
      (onClick)="copyPassword()"
    />
    <p-button
      [label]="'COMMON.CANCEL' | translate"
      (onClick)="showPasswordDialog = false"
    />
  </ng-template>
</p-dialog>
